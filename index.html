<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghozmap</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #1a1a2e;
}

.gm-header {
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 100;
}

.logo-text {
    font-size: 22px;
    font-weight: 500;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.search-container {
    flex: 1;
    max-width: 500px;
}

.search-container input {
    width: 100%;
    padding: 10px 20px;
    border: 1px solid #dfe1e5;
    border-radius: 30px;
    font-size: 14px;
    background: #f8f9fa;
}

.main-container {
    display: flex;
    height: calc(100vh - 62px);
}

.sidebar {
    width: 400px;
    background: white;
    border-right: 1px solid #e0e0e0;
    overflow-y: auto;
    padding: 20px;
}

.weather-card {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 24px;
    padding: 24px;
    color: white;
    margin-bottom: 20px;
}

.weather-temp {
    font-size: 56px;
    font-weight: 700;
    margin: 10px 0;
}

.weather-details {
    display: flex;
    gap: 20px;
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
}

.suggestion-box {
    background: #e8f5e9;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    border-left: 4px solid #4caf50;
}

.suggestion-title {
    font-weight: 600;
    margin-bottom: 8px;
    color: #2e7d32;
}

.checkin-btn {
    width: 100%;
    padding: 14px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
}

.checkin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.history-list {
    list-style: none;
}

.history-item {
    padding: 12px;
    background: #f8f9fa;
    border-radius: 12px;
    margin-bottom: 8px;
}

.maps-area {
    flex: 1;
    position: relative;
    background: #d4e2f0;
    overflow: hidden;
}

.map-pin {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 36px;
    cursor: pointer;
    z-index: 20;
}

.map-controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: white;
    border-radius: 10px;
    padding: 5px;
}

.map-control {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
}

.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 20px;
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.hidden {
    display: none;
}

.notif {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #323232;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    z-index: 200;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div>🌍 Ghozmap - Mendapatkan lokasi...</div>
</div>

<div class="gm-header">
    <div class="logo">
        <span>🗺️</span>
        <span class="logo-text">Ghozmap</span>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari lokasi...">
    </div>
</div>

<div class="main-container">
    <div class="sidebar">
        <div class="weather-card" id="weatherCard">
            <div>📍 LOKASI ANDA</div>
            <div class="weather-temp" id="tempValue">--°C</div>
            <div id="conditionText">--</div>
            <div class="weather-details">
                <span>💧 <span id="humidity">--</span>%</span>
                <span>💨 <span id="windSpeed">--</span> km/h</span>
            </div>
        </div>

        <div class="suggestion-box">
            <div class="suggestion-title">💡 Rekomendasi</div>
            <div id="suggestionText">Memuat rekomendasi...</div>
        </div>

        <button class="checkin-btn" id="shareBtn">📍 Check-in Lokasi</button>

        <div style="font-weight: 600; margin-bottom: 10px;">📋 Riwayat Check-in</div>
        <ul class="history-list" id="historyList">
            <li style="text-align:center; color:#999;">Loading...</li>
        </ul>
    </div>

    <div class="maps-area" id="mapsArea">
        <div id="mapPins"></div>
        <div class="map-controls">
            <div class="map-control" id="zoomIn">+</div>
            <div class="map-control" id="zoomOut">-</div>
        </div>
    </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://natsquslyfvknfboghai.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdHNxdXNseWZ2a25mYm9naGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDEzNzQsImV4cCI6MjA5NTgxNzM3NH0.rM10CTdqmeR2CBeZ6bt28VDljA3XsSaIpdauqu0saes";

const supabase = createClient(supabaseUrl, supabaseKey);

// DOM elements
const loadingEl = document.getElementById('loadingOverlay');
const tempEl = document.getElementById('tempValue');
const conditionEl = document.getElementById('conditionText');
const humidityEl = document.getElementById('humidity');
const windEl = document.getElementById('windSpeed');
const suggestionEl = document.getElementById('suggestionText');
const shareBtn = document.getElementById('shareBtn');
const historyList = document.getElementById('historyList');
const mapPins = document.getElementById('mapPins');

let currentLocation = null;
let currentWeather = null;

// ========== DATA CUACA SIMULASI (FALLBACK CEPAT) ==========
const mockWeatherData = {
    jakarta: { temp: 29, condition: "🌤️ Cerah Berawan", humidity: 78, wind: 12 },
    bandung: { temp: 23, condition: "☁️ Berawan", humidity: 82, wind: 8 },
    surabaya: { temp: 31, condition: "☀️ Cerah", humidity: 70, wind: 15 },
    default: { temp: 28, condition: "🌤️ Cerah", humidity: 75, wind: 10 }
};

function getMockWeather(lat, lon) {
    // Simulasi berdasarkan koordinat (biar ga nunggu lama)
    if(lat < -7.5 && lat > -7.0 && lon > 106.5 && lon < 107.0) {
        return mockWeatherData.jakarta;
    }
    if(lat < -7.0 && lat > -7.5 && lon > 107.5 && lon < 108.0) {
        return mockWeatherData.bandung;
    }
    return mockWeatherData.default;
}

// ========== GENERATE SUGGESTION (LENGKAP + CEPAT) ==========
function getSuggestion(weather) {
    // Hujan
    if(weather.isRaining) {
        return "🌧️ Bawa payung! Enak ngopi sambil rebahan. Jangan lupa jaket!";
    }
    
    // Panas ekstrem >33°C
    if(weather.temp > 33) {
        return "🔥 Panas banget! Banyak minum air putih. Pake sunscreen kalau keluar rumah.";
    }
    
    // Panas 30-33°C
    if(weather.temp > 30 && weather.temp <= 33) {
        return "☀️ Cuaca panas! Saatnya makan es krim atau es kelapa muda.";
    }
    
    // Sejuk 24-30°C (PERFECT!)
    if(weather.temp >= 24 && weather.temp <= 30) {
        return "🌿 CUACA PERFECT! Cocok buat jalan-jalan, olahraga, atau nongkrong di kafe!";
    }
    
    // Dingin 20-24°C
    if(weather.temp >= 20 && weather.temp < 24) {
        return "🍃 Adem ayem! Enak pakai hoodie. Cocok minum teh hangat sambil baca buku.";
    }
    
    // Dingin banget <20°C
    if(weather.temp < 20) {
        return "🥶 Dingin! Pakai jaket tebal. Enak makan bakso atau mie kuah panas.";
    }
    
    // Angin kencang
    if(weather.wind > 35) {
        return "💨 Angin kencang! Hati-hati di luar ruangan. Main layangan yuk!";
    }
    
    // Default
    return "🌟 Hari yang cerah! Tetap semangat dan jaga kesehatan ya!";
}

// ========== AMBIL CUACA DENGAN TIMEOUT CEPAT ==========
async function getWeatherFast(lat, lon) {
    // Pake mock dulu biar cepet
    const mock = getMockWeather(lat, lon);
    
    // Set current weather dengan mock (biar UI langsung ke-load)
    currentWeather = {
        temp: mock.temp,
        condition: mock.condition,
        humidity: mock.humidity,
        wind: mock.wind,
        isRaining: mock.condition.includes("Hujan") || mock.condition.includes("Gerimis")
    };
    
    // Update UI pake mock dulu
    updateWeatherUI(currentWeather);
    
    // Coba ambil real weather di background (tanpa nge-blok)
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000); // timeout 5 detik
        
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m`;
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if(response.ok) {
            const data = await response.json();
            const weatherCodes = {
                0: "☀️ Cerah", 1: "🌤️ Cerah Berawan", 2: "⛅ Sebagian Berawan",
                3: "☁️ Berawan", 45: "🌫️ Berkabut", 51: "🌧️ Gerimis",
                61: "🌧️ Hujan", 63: "🌧️ Hujan Sedang", 80: "🌦️ Hujan Ringan",
                95: "⛈️ Badai Petir"
            };
            const code = data.current?.weather_code || 0;
            
            // Update dengan data real
            currentWeather = {
                temp: Math.round(data.current?.temperature_2m || mock.temp),
                condition: weatherCodes[code] || mock.condition,
                humidity: data.current?.relative_humidity_2m || mock.humidity,
                wind: Math.round(data.current?.wind_speed_10m || mock.wind),
                isRaining: [51,61,63,80,95].includes(code)
            };
            updateWeatherUI(currentWeather);
        }
    } catch(err) {
        console.log("Real weather API error, pakai mock data:", err.message);
        // Tetap pake mock, UI udah ke-update sebelumnya
    }
    
    return currentWeather;
}

// ========== UPDATE UI WEATHER ==========
function updateWeatherUI(weather) {
    tempEl.innerText = `${weather.temp}°C`;
    conditionEl.innerHTML = weather.condition;
    humidityEl.innerText = weather.humidity;
    windEl.innerText = weather.wind;
    
    // Update suggestion
    const suggestion = getSuggestion(weather);
    suggestionEl.innerHTML = suggestion;
}

// ========== AMBIL ALAMAT (CEPAT) ==========
async function getAddressFast(lat, lon) {
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000);
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=16`;
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if(response.ok) {
            const data = await response.json();
            const road = data.address?.road || '';
            const city = data.address?.city || data.address?.town || '';
            if(road && city) return `${road}, ${city}`;
            if(city) return city;
        }
    } catch(err) {
        console.log("Address API error");
    }
    return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
}

// ========== LOAD HISTORY ==========
async function loadHistory() {
    try {
        const { data, error } = await supabase
            .from("locations")
            .select("*")
            .order("id", { ascending: false })
            .limit(10);
        
        if(error) throw error;
        
        if(!data || data.length === 0) {
            historyList.innerHTML = '<li style="text-align:center; color:#999;">Belum ada check-in</li>';
            return;
        }
        
        historyList.innerHTML = data.map(loc => `
            <li class="history-item">
                <div>📍 ${loc.latitude?.toFixed(5)}, ${loc.longitude?.toFixed(5)}</div>
                <div style="font-size:11px; color:#666;">🌡️ ${loc.weather_temp || '--'}°C | 💧 ${loc.weather_humidity || '--'}%</div>
                <div style="font-size:10px; color:#999;">${loc.created_at ? new Date(loc.created_at).toLocaleString('id-ID') : 'Baru saja'}</div>
            </li>
        `).join('');
        
        updateMapPins(data);
    } catch(err) {
        console.error(err);
        historyList.innerHTML = '<li style="text-align:center; color:#999;">Gagal load history</li>';
    }
}

// ========== UPDATE MAP PINS ==========
function updateMapPins(locations) {
    if(!mapPins) return;
    mapPins.innerHTML = '';
    
    if(currentLocation) {
        addPin(currentLocation.lat, currentLocation.lon, '📍', 'Anda');
    }
    
    locations?.forEach((loc, i) => {
        addPin(loc.latitude, loc.longitude, '📌', `Check-in ${i+1}`);
    });
}

function addPin(lat, lon, emoji, label) {
    const left = ((lon % 180 + 180) / 360) * 100;
    const top = ((90 - (lat % 90)) / 180) * 100;
    
    const pin = document.createElement('div');
    pin.className = 'map-pin';
    pin.style.left = `${Math.min(95, Math.max(5, left))}%`;
    pin.style.top = `${Math.min(95, Math.max(5, top))}%`;
    pin.innerHTML = `<div style="font-size:28px;">${emoji}</div><div style="font-size:10px; background:white; padding:2px 6px; border-radius:12px;">${label}</div>`;
    mapPins.appendChild(pin);
}

// ========== SAVE CHECK-IN ==========
async function saveCheckin() {
    if(!currentLocation || !currentWeather) {
        showNotif("Lokasi belum siap", true);
        return;
    }
    
    shareBtn.disabled = true;
    shareBtn.innerText = "⏳ Menyimpan...";
    
    const { error } = await supabase
        .from("locations")
        .insert([{
            latitude: currentLocation.lat,
            longitude: currentLocation.lon,
            weather_temp: currentWeather.temp,
            weather_condition: currentWeather.condition,
            weather_humidity: currentWeather.humidity
        }]);
    
    if(error) {
        showNotif("❌ Gagal menyimpan", true);
        shareBtn.innerText = "📍 Check-in";
        shareBtn.disabled = false;
        return;
    }
    
    showNotif("✅ Check-in berhasil!");
    shareBtn.innerText = "✅ Tersimpan!";
    setTimeout(() => {
        shareBtn.innerText = "📍 Check-in";
        shareBtn.disabled = false;
    }, 2000);
    
    await loadHistory();
}

// ========== NOTIF ==========
function showNotif(msg, isError = false) {
    const notif = document.createElement('div');
    notif.className = 'notif';
    notif.style.background = isError ? '#c5221f' : '#1a73e8';
    notif.innerText = msg;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 2500);
}

// ========== INIT ==========
async function init() {
    loadingEl.style.display = 'flex';
    
    navigator.geolocation.getCurrentPosition(
        async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            currentLocation = { lat, lon };
            
            // Ambil cuaca (pake mock dulu biar cepet)
            await getWeatherFast(lat, lon);
            
            // Ambil alamat (background)
            getAddressFast(lat, lon).then(addr => {
                const addressEl = document.querySelector('.weather-card div:first-child');
                if(addressEl) addressEl.innerHTML = `📍 ${addr}`;
            });
            
            await loadHistory();
            loadingEl.style.display = 'none';
            showNotif("✨ Ghozmap siap digunakan!");
        },
        (error) => {
            loadingEl.style.display = 'none';
            let msg = "Izin lokasi ditolak. Aktifkan lokasi untuk fitur lengkap.";
            alert(msg);
            // Set default weather
            currentWeather = { temp: 28, condition: "🌤️ Cerah", humidity: 75, wind: 10, isRaining: false };
            updateWeatherUI(currentWeather);
        },
        { enableHighAccuracy: true, timeout: 8000 }
    );
}

// ========== EVENT LISTENERS ==========
shareBtn.addEventListener('click', saveCheckin);

document.getElementById('zoomIn')?.addEventListener('click', () => {
    const maps = document.getElementById('mapsArea');
    let currentZoom = parseInt(maps.style.backgroundSize) || 100;
    currentZoom = Math.min(currentZoom + 20, 200);
    maps.style.backgroundSize = `${currentZoom}%`;
});

document.getElementById('zoomOut')?.addEventListener('click', () => {
    const maps = document.getElementById('mapsArea');
    let currentZoom = parseInt(maps.style.backgroundSize) || 100;
    currentZoom = Math.max(currentZoom - 20, 50);
    maps.style.backgroundSize = `${currentZoom}%`;
});

// START
init();
</script>

</body>
    </html>
